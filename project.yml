name: SalishTides
options:
  bundleIdPrefix: com.bguenther
  deploymentTarget:
    iOS: "17.0"

packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.27.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.11.1"

targets:
  SalishTides:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SalishTides
        excludes:
          - "Resources/maps"
          - "Resources/maps_vol2"
          - "Resources/maps_vol3"
          - "Resources/maps_vol4"
    postBuildScripts:
      - name: Copy Atlas Map Data
        script: |
          for VOL in maps maps_vol2 maps_vol3 maps_vol4; do
            DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/${VOL}"
            mkdir -p "$DEST"
            rsync -a --delete "${SRCROOT}/data/${VOL}/" "$DEST/"
          done
    info:
      path: SalishTides/Info.plist
      properties:
        CFBundleDisplayName: "Salish Tides"
        UILaunchStoryboardName: ""
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSLocationWhenInUseUsageDescription: "Your location is shown on the chart so you can orient yourself relative to the currents."
        UIApplicationSupportsIndirectInputEvents: true
        UIStatusBarHidden: false
    dependencies:
      - package: MapLibre
        product: MapLibre
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bguenther.salishtides
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_PREVIEWS: "YES"
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: wholemodule
