name: SalishTides
options:
  bundleIdPrefix: com.bguenther
  deploymentTarget:
    iOS: "17.0"

packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.27.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.11.1"

targets:
  SalishTides:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Base.xcconfig
      Release: Config/Base.xcconfig
    sources:
      # SalishTides/Resources includes current_model.b1, the packed offline
      # tidal-current model (committed; regenerated by dev/model/b1_pack_grid.py
      # and decoded by SalishTides/CurrentModel/OfflineCurrentModel.swift).
      - path: SalishTides
        excludes:
          - "Resources/maps"
          - "Resources/maps_vol2"
          - "Resources/maps_vol3"
          - "Resources/maps_vol4"
    postBuildScripts:
      # Requires a populated data/ directory (see DESIGN.md "Data bootstrap").
      # data/ is gitignored, so a fresh clone must generate it first — these
      # rsyncs fail the build if the source dirs are missing.
      - name: Copy Atlas & Tide Data
        script: |
          # Guard: fail the build if bundled atlas data is missing/empty (it is
          # gitignored — run dev/extraction/regenerate_all.sh to generate it).
          for VOL in maps maps_vol2 maps_vol3 maps_vol4; do
            SRC="${SRCROOT}/data/${VOL}"
            if [ ! -d "$SRC" ] || [ -z "$(ls -A "$SRC" 2>/dev/null)" ]; then
              echo "error: ${SRC} is missing or empty. Run dev/extraction/regenerate_all.sh to generate bundled atlas data." >&2
              exit 1
            fi
          done
          for VOL in maps maps_vol2 maps_vol3 maps_vol4; do
            DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/${VOL}"
            mkdir -p "$DEST"
            rsync -a --delete "${SRCROOT}/data/${VOL}/" "$DEST/"
          done
          # Tide-prediction bundle (single JSON, lives under tides/)
          TIDE_DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/tides"
          mkdir -p "$TIDE_DEST"
          rsync -a --delete "${SRCROOT}/data/tides/" "$TIDE_DEST/"
          # Offline basemap PMTiles (bundled under basemap/)
          BASEMAP_DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/basemap"
          mkdir -p "$BASEMAP_DEST"
          rsync -a --delete "${SRCROOT}/data/basemap/" "$BASEMAP_DEST/"
    info:
      path: SalishTides/Info.plist
      properties:
        CFBundleDisplayName: "Salish Tides"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Modern launch screen (no storyboard). The centered LaunchLogo image
        # set (light/dark variants) renders the wordmark on the system
        # background, which adapts white/black per appearance. Sized in the
        # asset catalog (~280 pt wide), so it's centered at native size on
        # every device rather than scaled/letterboxed.
        UILaunchScreen:
          UIImageName: LaunchLogo
        # Export compliance: the app uses only standard HTTPS (exempt), so this
        # answers the per-upload encryption prompt in App Store Connect once.
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
        # Background refresh: wake opportunistically to keep the SalishSeaCast
        # live-data cache fresh. `fetch` gates the BGAppRefreshTask; the
        # identifier must match BackgroundRefresh.taskIdentifier exactly.
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.bguenther.salishtides.refresh
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSLocationWhenInUseUsageDescription: "Your location is shown on the chart so you can orient yourself relative to the currents."
        UIApplicationSupportsIndirectInputEvents: true
        UIStatusBarHidden: false
        MAPTILER_KEY: "$(MAPTILER_KEY)"
    dependencies:
      - package: MapLibre
        product: MapLibre
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bguenther.salishtides
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_PREVIEWS: "YES"
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: wholemodule

  # Unit tests for the pure logic (date parsing, interpolation, grid math,
  # packing) — no UI tests, no network.
  SalishTidesTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SalishTidesTests
    dependencies:
      - target: SalishTides
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete

schemes:
  SalishTides:
    build:
      targets:
        SalishTides: all
        SalishTidesTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SalishTidesTests
